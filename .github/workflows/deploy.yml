name: Deploy to PythonAnywhere

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via PythonAnywhere API
        env:
          USERNAME: ${{ secrets.PA_USERNAME }}
          API_TOKEN: ${{ secrets.PA_API_TOKEN }}
          DOMAIN: ${{ secrets.PA_DOMAIN }}
        run: |
          # Pull latest code
          curl -X POST "https://www.pythonanywhere.com/api/v0/user/$USERNAME/consoles/" \
            -H "Authorization: Token $API_TOKEN" \
            -d "executable=bash&arguments=-c 'cd ~/$DOMAIN && git pull origin main && source virtualenv/bin/activate && pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput'"
          
          # Reload the web app
          curl -X POST "https://www.pythonanywhere.com/api/v0/user/$USERNAME/webapps/$DOMAIN/reload/" \
            -H "Authorization: Token $API_TOKEN"
